<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.cdnfonts.com/css/bubbleboddy-neue-trial');

body{
margin:0;
font-family:'Bubbleboddy Neue Trial',sans-serif;
background:linear-gradient(135deg,#ff6f91,#ffc75f);
overflow-x:hidden;
color:white;
text-align:center;
}

/* ГЛАВНЫЙ ЭКРАН */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.title{
font-size:90px;
}

.scroll{
margin-top:40px;
font-size:30px;
}

/* СЕРДЕЧКИ */
.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float linear infinite;
}
@keyframes float{
to{transform:translateY(-120vh);}
}

/* КНИГА */
.book-scene{
margin-top:80px;
perspective:2000px;
}

/* ОБЛОЖКА */
.cover{
width:320px;
height:420px;
margin:auto;
background:linear-gradient(135deg,#7b2d43,#d85b8a);
border-radius:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
position:relative;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.cover-text{
font-size:50px;
color:white;
}

/* ЗАМОК */
.lock{
position:absolute;
right:-25px;
top:180px;
width:50px;
height:40px;
background:gold;
border-radius:10px;
}

.lock::before{
content:"";
position:absolute;
width:30px;
height:25px;
border:5px solid gold;
border-bottom:none;
border-radius:20px 20px 0 0;
top:-20px;
left:10px;
}

/* ОТКРЫТАЯ КНИГА */
.book{
display:none;
width:800px;
height:500px;
margin:auto;
position:relative;
}

.page{
width:50%;
height:100%;
position:absolute;
top:0;
background:white;
overflow:hidden;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.left{left:0;}
.right{
right:0;
transform-origin:left;
transition:1s;
}

.right.flip{
transform:rotateY(-180deg);
}

.page img{
width:100%;
height:100%;
object-fit:cover;
}

/* ПЕРЕПЛЁТ */
.spine{
position:absolute;
left:50%;
top:0;
width:10px;
height:100%;
background:#ccc;
transform:translateX(-50%);
}

/* КНОПКИ */
.controls{
margin-top:20px;
display:none;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<script>
for(let i=0;i<30;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(h);
}
</script>

<div class="hero">
<div class="title">С днём рождения,<br>Сашулька ❤️</div>
<div class="scroll">Листай вниз ↓</div>
</div>

<h2>Наша история 📖</h2>

<div class="book-scene">

<div class="cover" onclick="openBook()">
<div class="cover-text">Открыть</div>
<div class="lock"></div>
</div>

<div class="book" id="book">
<div class="spine"></div>

<div class="page left">
<img id="leftImg">
</div>

<div class="page right" id="rightPage">
<img id="rightImg">
</div>
</div>

<div class="controls" id="controls">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

</div>

<script>
const photos=[
"photo_2026-05-01_11-58-20.jpg",
"photo_2026-05-01_11-58-22.jpg",
"photo_2026-05-01_11-58-27.jpg",
"photo_2026-05-01_12-24-50.jpg",
"photo_2026-05-01_12-24-53.jpg",
"photo_2026-05-01_12-24-54.jpg",
"photo_2026-05-01_12-24-55.jpg",
"photo_2026-05-01_12-24-56.jpg",
"photo_2026-05-01_12-24-58.jpg",
"photo_2026-05-01_12-24-59.jpg",
"photo_2026-05-01_12-25-00.jpg",
"photo_2026-05-01_12-25-01.jpg",
"photo_2026-05-01_12-25-02.jpg",
"photo_2026-05-01_12-25-03.jpg",
"photo_2026-05-01_12-25-04.jpg",
"photo_2026-05-01_12-25-05.jpg",
"photo_2026-05-01_12-25-06.jpg",
"photo_2026-05-01_12-25-07.jpg"
];

let index=0;

function openBook(){
document.querySelector(".cover").style.display="none";
document.getElementById("book").style.display="block";
document.getElementById("controls").style.display="block";
render();
}

function render(){
document.getElementById("leftImg").src=photos[index];
document.getElementById("rightImg").src=photos[index+1];
}

function next(){
if(index<photos.length-2){
document.getElementById("rightPage").classList.add("flip");
setTimeout(()=>{
index+=2;
render();
document.getElementById("rightPage").classList.remove("flip");
},800);
}
}

function prev(){
if(index>=2){
document.getElementById("rightPage").classList.add("flip");
setTimeout(()=>{
index-=2;
render();
document.getElementById("rightPage").classList.remove("flip");
},800);
}
}
</script>

</body>
</html>
