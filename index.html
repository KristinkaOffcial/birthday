<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOK_VERSION_2</title>

<style>
@import url('https://fonts.cdnfonts.com/css/bubbleboddy-neue-trial');

*{box-sizing:border-box}

body{
  margin:0;
  overflow-x:hidden;
  font-family:'Bubbleboddy Neue Trial', sans-serif;
  color:white;
  text-align:center;
  background:
    radial-gradient(circle at top left,#ffd1e8,transparent 35%),
    radial-gradient(circle at bottom right,#b388ff,transparent 35%),
    linear-gradient(135deg,#ff5f8f,#ff9671,#ffc75f);
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title{
  font-size:clamp(54px,10vw,115px);
  line-height:1;
  text-shadow:0 12px 35px rgba(90,0,60,.35);
}

.scroll{
  margin-top:40px;
  font-size:30px;
  animation:bounce 1.4s infinite;
}

@keyframes bounce{
  50%{transform:translateY(12px)}
}

.heart,.confetti{
  position:fixed;
  pointer-events:none;
  z-index:1;
}

.heart{
  bottom:-30px;
  font-size:24px;
  animation:heartFloat linear infinite;
}

@keyframes heartFloat{
  to{transform:translateY(-120vh) rotate(360deg);opacity:0}
}

.confetti{
  top:-20px;
  width:10px;
  height:16px;
  animation:confettiFall linear infinite;
}

@keyframes confettiFall{
  to{transform:translateY(120vh) rotate(720deg);opacity:0}
}

.story{
  min-height:100vh;
  padding:70px 15px;
}

.story h2{
  font-size:clamp(48px,8vw,90px);
  margin-bottom:40px;
  text-shadow:0 10px 30px rgba(90,0,60,.3);
}

/* ОБЛОЖКА */
.cover{
  width:320px;
  height:430px;
  margin:0 auto;
  position:relative;
  cursor:pointer;
  border-radius:24px 14px 14px 24px;
  background:
    linear-gradient(90deg,rgba(0,0,0,.38),transparent 16%),
    radial-gradient(circle at center,rgba(255,255,255,.18),transparent 42%),
    linear-gradient(135deg,#5d1632,#d85b8a,#7b2d43);
  box-shadow:
    0 35px 90px rgba(60,0,40,.48),
    inset 0 0 0 7px rgba(255,230,170,.45),
    inset 0 0 0 16px rgba(255,255,255,.08);
  display:flex;
  justify-content:center;
  align-items:center;
  transition:.6s;
}

.cover:hover{
  transform:rotateY(-12deg) scale(1.03);
}

.cover::before{
  content:"";
  position:absolute;
  inset:28px;
  border:2px solid rgba(255,235,180,.85);
  border-radius:20px;
}

.cover-text{
  font-size:64px;
  color:#fff3c4;
  text-shadow:0 7px 18px rgba(0,0,0,.4);
}

/* ЗАМОК */
.lock{
  position:absolute;
  right:-34px;
  top:175px;
  width:72px;
  height:58px;
  border-radius:14px;
  background:linear-gradient(135deg,#ffe08a,#b7791f);
  box-shadow:0 12px 28px rgba(0,0,0,.38);
}

.lock::before{
  content:"";
  position:absolute;
  left:15px;
  top:-33px;
  width:42px;
  height:36px;
  border:8px solid #ffe08a;
  border-bottom:none;
  border-radius:35px 35px 0 0;
}

.lock::after{
  content:"♥";
  position:absolute;
  color:#7b2d43;
  font-size:28px;
  left:23px;
  top:12px;
}

.lock.open{
  animation:unlock .8s forwards;
}

@keyframes unlock{
  0%{transform:scale(1)}
  45%{transform:scale(1.08) rotate(-12deg)}
  100%{transform:translateY(35px) rotate(25deg) scale(0);opacity:0}
}

/* КНИГА */
.book-wrap{
  display:none;
}

.book{
  width:min(94vw,930px);
  height:560px;
  margin:0 auto;
  position:relative;
  perspective:2200px;
  filter:drop-shadow(0 35px 70px rgba(60,0,40,.45));
}

.book-bg{
  position:absolute;
  inset:0;
  border-radius:26px;
  background:
    linear-gradient(90deg,#d2a56e 0%,#f7dfb7 3%,#fff4d8 48%,#c79b62 50%,#fff4d8 52%,#f7dfb7 97%,#d2a56e 100%);
  box-shadow:
    inset 0 0 35px rgba(120,70,30,.25),
    0 30px 80px rgba(0,0,0,.35);
}

.book-bg::before{
  content:"";
  position:absolute;
  left:50%;
  top:25px;
  bottom:25px;
  width:7px;
  transform:translateX(-50%);
  background:rgba(90,55,30,.38);
  border-radius:999px;
  box-shadow:0 0 25px rgba(70,40,20,.3);
}

.photo-page{
  position:absolute;
  top:32px;
  width:calc(50% - 42px);
  height:calc(100% - 64px);
  border-radius:18px;
  background:#fff4d8;
  padding:14px;
  box-shadow:
    inset 0 0 20px rgba(120,70,30,.18),
    0 10px 24px rgba(80,40,20,.18);
  overflow:hidden;
}

.left-page{
  left:32px;
}

.right-page{
  right:32px;
}

.photo-page img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:13px;
  display:block;
}

/* АНИМИРУЮЩИЙСЯ ЛИСТ */
.flip-page{
  position:absolute;
  top:32px;
  left:50%;
  width:calc(50% - 42px);
  height:calc(100% - 64px);
  transform-origin:left center;
  transform-style:preserve-3d;
  z-index:10;
  display:none;
  transition:transform .95s cubic-bezier(.2,.75,.2,1);
}

.flip-page.active{
  display:block;
}

.flip-page.turn{
  transform:rotateY(-180deg);
}

.face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  border-radius:18px;
  background:#fff4d8;
  padding:14px;
  box-shadow:
    inset 0 0 20px rgba(120,70,30,.18),
    0 14px 30px rgba(80,40,20,.25);
}

.face.back{
  transform:rotateY(180deg);
}

.face img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:13px;
}

.controls{
  margin-top:28px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
}

button{
  border:none;
  border-radius:999px;
  padding:14px 24px;
  background:linear-gradient(135deg,#ff4f9a,#ff8fab);
  color:white;
  font-size:18px;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 12px 28px rgba(130,0,70,.28);
}

.counter{
  font-size:22px;
  text-shadow:0 6px 18px rgba(0,0,0,.25);
}

@media(max-width:760px){
  .book{
    height:520px;
  }

  .book-bg::before{
    display:none;
  }

  .photo-page{
    width:calc(100% - 64px);
  }

  .left-page{
    display:none;
  }

  .right-page{
    left:32px;
    right:auto;
  }

  .flip-page{
    left:32px;
    width:calc(100% - 64px);
  }
}
</style>
</head>

<body>

<div class="hero">
  <div class="title">С днём рождения,<br>Сашулька ❤️</div>
  <div class="scroll">Листай вниз ↓</div>
</div>

<section class="story">
  <h2>Наша история</h2>

  <div class="cover" id="cover" onclick="openBook()">
    <div class="cover-text">Открыть</div>
    <div class="lock" id="lock"></div>
  </div>

  <div class="book-wrap" id="bookWrap">
    <div class="book">
      <div class="book-bg"></div>

      <div class="photo-page left-page">
        <img id="leftPhoto">
      </div>

      <div class="photo-page right-page">
        <img id="rightPhoto">
      </div>

      <div class="flip-page" id="flipPage">
        <div class="face front">
          <img id="flipFront">
        </div>
        <div class="face back">
          <img id="flipBack">
        </div>
      </div>
    </div>

    <div class="controls">
      <button onclick="prevSpread()">← Назад</button>
      <div class="counter" id="counter"></div>
      <button onclick="nextSpread()">Вперёд →</button>
    </div>
  </div>
</section>

<script>
const photos = [
"photo_2026-05-01_11-58-20.jpg",
"photo_2026-05-01_11-58-22.jpg",
"photo_2026-05-01_11-58-27.jpg",
"photo_2026-05-01_12-24-50.jpg",
"photo_2026-05-01_12-24-53.jpg",
"photo_2026-05-01_12-24-54.jpg",
"photo_2026-05-01_12-24-55.jpg",
"photo_2026-05-01_12-24-56.jpg",
"photo_2026-05-01_12-24-58.jpg",
"photo_2026-05-01_12-24-59.jpg",
"photo_2026-05-01_12-25-00.jpg",
"photo_2026-05-01_12-25-01.jpg",
"photo_2026-05-01_12-25-02.jpg",
"photo_2026-05-01_12-25-03.jpg",
"photo_2026-05-01_12-25-04.jpg",
"photo_2026-05-01_12-25-05.jpg",
"photo_2026-05-01_12-25-06.jpg",
"photo_2026-05-01_12-25-07.jpg"
];

let spread = 0;
let isTurning = false;
const totalSpreads = Math.ceil(photos.length / 2);

function photoAt(i){
  return photos[i] || photos[photos.length - 1];
}

function renderSpread(){
  const leftIndex = spread * 2;
  const rightIndex = spread * 2 + 1;

  document.getElementById("leftPhoto").src = photoAt(leftIndex);
  document.getElementById("rightPhoto").src = photoAt(rightIndex);

  document.getElementById("counter").innerText =
    (spread + 1) + " / " + totalSpreads;
}

function openBook(){
  document.getElementById("lock").classList.add("open");

  setTimeout(() => {
    document.getElementById("cover").style.display = "none";
    document.getElementById("bookWrap").style.display = "block";
    renderSpread();
  }, 650);
}

function nextSpread(){
  if(isTurning || spread >= totalSpreads - 1) return;
  isTurning = true;

  const flip = document.getElementById("flipPage");

  document.getElementById("flipFront").src = photoAt(spread * 2 + 1);
  document.getElementById("flipBack").src = photoAt((spread + 1) * 2);

  flip.classList.add("active");

  setTimeout(() => {
    flip.classList.add("turn");
  }, 30);

  setTimeout(() => {
    spread++;
    renderSpread();
    flip.classList.remove("active", "turn");
    isTurning = false;
  }, 980);
}

function prevSpread(){
  if(isTurning || spread <= 0) return;
  isTurning = true;

  const flip = document.getElementById("flipPage");

  spread--;
  renderSpread();

  document.getElementById("flipFront").src = photoAt(spread * 2 + 1);
  document.getElementById("flipBack").src = photoAt((spread + 1) * 2);

  flip.classList.add("active", "turn");

  setTimeout(() => {
    flip.classList.remove("turn");
  }, 30);

  setTimeout(() => {
    flip.classList.remove("active");
    isTurning = false;
  }, 980);
}

/* сердечки */
for(let i=0;i<38;i++){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(4+Math.random()*5)+"s";
  h.style.animationDelay=Math.random()*4+"s";
  document.body.appendChild(h);
}

/* конфетти */
const colors=["#ff4d6d","#ffd166","#06d6a0","#4d96ff","#c77dff","#fff"];
for(let i=0;i<95;i++){
  const c=document.createElement("div");
  c.className="confetti";
  c.style.left=Math.random()*100+"vw";
  c.style.background=colors[Math.floor(Math.random()*colors.length)];
  c.style.animationDuration=(3+Math.random()*4)+"s";
  c.style.animationDelay=Math.random()*3+"s";
  c.style.borderRadius=Math.random()>.5 ? "50%" : "3px";
  document.body.appendChild(c);
}
</script>

</body>
</html>
