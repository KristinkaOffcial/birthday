<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Саше ❤️</title>

<style>
@import url('https://fonts.cdnfonts.com/css/bubbleboddy-neue-trial');

:root{
  --bg1:#ff6f91; --bg2:#ffc75f;
  --cover1:#6b1f3a; --cover2:#d85b8a;
}

*{box-sizing:border-box}
body{
  margin:0; overflow-x:hidden; color:#fff; text-align:center;
  font-family:'Bubbleboddy Neue Trial', system-ui, sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* hero */
.hero{
  height:100vh; display:flex; flex-direction:column;
  justify-content:center; align-items:center;
}
.title{ font-size: clamp(56px,9vw,110px); line-height:1.05; }
.scroll{ margin-top:36px; font-size:28px; animation:bounce 1.5s infinite; }
@keyframes bounce{50%{transform:translateY(10px)}}

/* hearts + confetti */
.heart,.confetti{position:fixed; pointer-events:none; z-index:1}
.heart{bottom:-30px; font-size:22px; animation:heart 6s linear infinite}
@keyframes heart{to{transform:translateY(-120vh) rotate(360deg); opacity:0}}
.confetti{top:-10px; width:10px; height:16px; animation:fall 5s linear infinite}
@keyframes fall{to{transform:translateY(120vh) rotate(720deg); opacity:0}}

/* scene */
.scene{ margin-top:80px; perspective:2000px; }

/* cover */
.cover{
  width:320px; height:420px; margin:0 auto;
  border-radius:18px 12px 12px 18px; cursor:pointer;
  background:
    linear-gradient(90deg, rgba(0,0,0,.35), transparent 14%),
    linear-gradient(135deg,var(--cover1),var(--cover2));
  box-shadow:0 30px 80px rgba(0,0,0,.45),
             inset 0 0 0 6px rgba(255,230,170,.45);
  display:flex; align-items:center; justify-content:center;
  position:relative; transition:.6s;
}
.cover:hover{ transform:rotateY(-12deg) scale(1.03) }
.cover::before{
  content:""; position:absolute; inset:22px;
  border:2px solid rgba(255,235,180,.8); border-radius:14px;
}
.cover-title{ font-size:56px; color:#fff3c4; text-shadow:0 6px 16px rgba(0,0,0,.4) }

/* lock (минимал) */
.lock{
  position:absolute; right:-28px; top:170px;
  width:64px; height:52px; border-radius:12px;
  background:linear-gradient(135deg,#ffe082,#b7791f);
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}
.lock::before{
  content:""; position:absolute; left:14px; top:-28px;
  width:36px; height:30px; border:7px solid #ffe082;
  border-bottom:none; border-radius:30px 30px 0 0;
}
.lock.open{ animation:unlock .8s forwards }
@keyframes unlock{
  0%{transform:scale(1)}
  50%{transform:scale(1.08) rotate(-10deg)}
  100%{transform:translateY(30px) rotate(20deg) scale(0); opacity:0}
}

/* book */
.book{
  display:none; margin:0 auto;
  width:min(92vw,900px); height:540px;
  position:relative; transform-style:preserve-3d;
}
.book.open{ animation:open .7s ease }
@keyframes open{
  from{transform:scale(.85) rotateX(12deg); opacity:0}
  to{transform:scale(1) rotateX(0); opacity:1}
}

/* background (paper + spine) */
.book-bg{
  position:absolute; inset:0; border-radius:22px;
  background:
    linear-gradient(90deg,#f5dfbd 0%,#fff4d8 48%,#d4ad7d 50%,#fff4d8 52%,#f7dfbd 100%);
  box-shadow:inset 0 0 30px rgba(120,70,30,.25),
             0 30px 80px rgba(0,0,0,.4);
}
.book-bg::before{
  content:""; position:absolute; left:50%; top:24px; bottom:24px;
  width:6px; transform:translateX(-50%);
  background:rgba(100,60,30,.35); border-radius:999px;
}

/* left static page (всегда видна слева) */
.left-static{
  position:absolute; left:24px; top:24px;
  width:calc(50% - 36px); height:calc(100% - 48px);
  border-radius:14px; background:
    radial-gradient(circle at top left, rgba(255,255,255,.8), transparent 40%),
    linear-gradient(135deg,#fff8e8,#f4d9ac);
  box-shadow:inset 0 0 25px rgba(130,80,35,.2);
}

/* flipping pages (левая кромка у центра) */
.page{
  position:absolute; left:50%; top:24px;
  width:calc(50% - 36px); height:calc(100% - 48px);
  transform-origin:left center; transform-style:preserve-3d;
  transition:transform .9s cubic-bezier(.2,.8,.2,1);
  z-index:10;
}
.page.flipped{ transform:rotateY(-180deg) }

.face{
  position:absolute; inset:0; backface-visibility:hidden;
  border-radius:14px; overflow:hidden;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.85), transparent 40%),
    linear-gradient(135deg,#fff8e8,#f4d9ac);
  box-shadow:inset 0 0 20px rgba(130,80,35,.18),
             0 10px 25px rgba(80,40,20,.18);
  display:flex; align-items:center; justify-content:center;
}
.face.back{ transform:rotateY(180deg) }

.face img{
  width:100%; height:100%; object-fit:cover;
}

/* controls */
.controls{ display:none; margin-top:20px; gap:14px; justify-content:center }
.controls.show{ display:flex }
button{
  border:none; border-radius:999px; padding:12px 20px;
  background:#ff4d6d; color:#fff; font-size:16px; cursor:pointer;
}

/* small screens */
@media(max-width:720px){
  .left-static{display:none}
  .book-bg::before{display:none}
  .page{ left:24px; width:calc(100% - 48px) }
}
</style>
</head>

<body>

<!-- hearts + confetti -->
<script>
for(let i=0;i<36;i++){
  const h=document.createElement('div');
  h.className='heart'; h.textContent='❤️';
  h.style.left=Math.random()*100+'vw';
  h.style.animationDuration=(4+Math.random()*5)+'s';
  h.style.animationDelay=(Math.random()*4)+'s';
  document.body.appendChild(h);
}
const colors=['#ff4d6d','#ffd166','#06d6a0','#4d96ff','#c77dff','#fff'];
for(let i=0;i<90;i++){
  const c=document.createElement('div');
  c.className='confetti';
  c.style.left=Math.random()*100+'vw';
  c.style.background=colors[Math.floor(Math.random()*colors.length)];
  c.style.animationDuration=(3+Math.random()*4)+'s';
  c.style.animationDelay=(Math.random()*3)+'s';
  document.body.appendChild(c);
}
</script>

<div class="hero">
  <div class="title">С днём рождения,<br>Сашулька ❤️</div>
  <div class="scroll">Листай вниз ↓</div>
</div>

<h2>Наша история 📖</h2>

<div class="scene">

  <!-- cover -->
  <div class="cover" id="cover" onclick="openBook()">
    <div class="cover-title">Открыть</div>
    <div class="lock" id="lock"></div>
  </div>

  <!-- book -->
  <div class="book" id="book">
    <div class="book-bg"></div>
    <div class="left-static"></div>
    <div id="pages"></div>
  </div>

  <div class="controls" id="controls">
    <button onclick="prev()">← Назад</button>
    <button onclick="next()">Вперёд →</button>
  </div>
</div>

<script>
/* твои фото (развороты = по 2 фото) */
const photos = [
"photo_2026-05-01_11-58-20.jpg","photo_2026-05-01_11-58-22.jpg",
"photo_2026-05-01_11-58-27.jpg","photo_2026-05-01_12-24-50.jpg",
"photo_2026-05-01_12-24-53.jpg","photo_2026-05-01_12-24-54.jpg",
"photo_2026-05-01_12-24-55.jpg","photo_2026-05-01_12-24-56.jpg",
"photo_2026-05-01_12-24-58.jpg","photo_2026-05-01_12-24-59.jpg",
"photo_2026-05-01_12-25-00.jpg","photo_2026-05-01_12-25-01.jpg",
"photo_2026-05-01_12-25-02.jpg","photo_2026-05-01_12-25-03.jpg",
"photo_2026-05-01_12-25-04.jpg","photo_2026-05-01_12-25-05.jpg",
"photo_2026-05-01_12-25-06.jpg","photo_2026-05-01_12-25-07.jpg"
];

/* собираем страницы: каждый лист — это 2 фото (front/back) */
const pagesEl = document.getElementById('pages');
const pairs = [];
for(let i=0;i<photos.length;i+=2){
  pairs.push([photos[i], photos[i+1] || photos[i]]);
}

pairs.forEach((pair, idx)=>{
  const page = document.createElement('div');
  page.className='page';
  page.style.zIndex = (pairs.length - idx); // сверху первые

  page.innerHTML = `
    <div class="face front"><img src="${pair[0]}"></div>
    <div class="face back"><img src="${pair[1]}"></div>
  `;
  pagesEl.appendChild(page);
});

const pages = Array.from(document.querySelectorAll('.page'));
let current = 0;

function openBook(){
  document.getElementById('lock').classList.add('open');
  setTimeout(()=>{
    document.getElementById('cover').style.display='none';
    const b = document.getElementById('book');
    b.style.display='block';
    b.classList.add('open');
    document.getElementById('controls').classList.add('show');
  }, 500);
}

function next(){
  if(current < pages.length){
    pages[current].classList.add('flipped');
    current++;
  }
}

function prev(){
  if(current > 0){
    current--;
    pages[current].classList.remove('flipped');
  }
}
</script>

</body>
</html>
