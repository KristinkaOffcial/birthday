<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.cdnfonts.com/css/bubbleboddy-neue-trial');

body{
margin:0;
font-family:'Bubbleboddy Neue Trial',sans-serif;
background:linear-gradient(135deg,#ff6f91,#ffc75f);
color:white;
overflow-x:hidden;
text-align:center;
}

/* главный экран */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.title{
font-size:90px;
text-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.scroll{
margin-top:40px;
font-size:30px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
50%{transform:translateY(10px);}
}

/* сердечки */
.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:float linear infinite;
}

@keyframes float{
to{transform:translateY(-120vh);}
}

/* конфетти */
.confetti{
position:fixed;
top:-10px;
width:10px;
height:10px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* книга */
.book{
width:800px;
height:500px;
margin:80px auto;
position:relative;
perspective:2000px;
}

.page{
width:50%;
height:100%;
position:absolute;
top:0;
background:white;
overflow:hidden;
border-radius:12px;
backface-visibility:hidden;
}

.left{left:0;}

.right{
right:0;
transform-origin:left;
transform-style:preserve-3d;
transition:1s;
}

.right.flip{
transform:rotateY(-180deg);
}

.page img{
width:100%;
height:100%;
object-fit:cover;
}

/* кнопки */
.controls{
margin-top:20px;
}

button{
padding:12px 22px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<script>
/* сердечки */
for(let i=0;i<30;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(h);
}

/* конфетти */
for(let i=0;i<70;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=["red","yellow","blue","pink"][Math.floor(Math.random()*4)];
c.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(c);
}
</script>

<div class="hero">
<div class="title">С днём рождения,<br>Сашулька ❤️</div>
<div class="scroll">Листай вниз ↓</div>
</div>

<h2>Наша история 📖</h2>

<div class="book">
<div class="page left">
<img id="leftImg">
</div>

<div class="page right" id="rightPage">
<img id="rightImg">
</div>
</div>

<div class="controls">
<button onclick="prev()">← Назад</button>
<button onclick="next()">Вперёд →</button>
</div>

<script>
const photos=[
"photo_2026-05-01_11-58-20.jpg",
"photo_2026-05-01_11-58-22.jpg",
"photo_2026-05-01_11-58-27.jpg",
"photo_2026-05-01_12-24-50.jpg",
"photo_2026-05-01_12-24-53.jpg",
"photo_2026-05-01_12-24-54.jpg",
"photo_2026-05-01_12-24-55.jpg",
"photo_2026-05-01_12-24-56.jpg",
"photo_2026-05-01_12-24-58.jpg",
"photo_2026-05-01_12-24-59.jpg",
"photo_2026-05-01_12-25-00.jpg",
"photo_2026-05-01_12-25-01.jpg",
"photo_2026-05-01_12-25-02.jpg",
"photo_2026-05-01_12-25-03.jpg",
"photo_2026-05-01_12-25-04.jpg",
"photo_2026-05-01_12-25-05.jpg",
"photo_2026-05-01_12-25-06.jpg",
"photo_2026-05-01_12-25-07.jpg"
];

let index=0;

function render(){
document.getElementById("leftImg").src=photos[index];
document.getElementById("rightImg").src=photos[index+1];
}

function next(){
if(index<photos.length-2){
document.getElementById("rightPage").classList.add("flip");

setTimeout(()=>{
index+=2;
render();
document.getElementById("rightPage").classList.remove("flip");
},700);
}
}

function prev(){
if(index>=2){
document.getElementById("rightPage").classList.add("flip");

setTimeout(()=>{
index-=2;
render();
document.getElementById("rightPage").classList.remove("flip");
},700);
}
}

render();
</script>

</body>
</html>
