<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С днём рождения, Сашулька ❤️</title>

<style>
@import url('https://fonts.cdnfonts.com/css/bubbleboddy-neue-trial');

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  overflow-x: hidden;
  font-family: 'Bubbleboddy Neue Trial', sans-serif;
  color: white;
  text-align: center;
  background:
    radial-gradient(circle at top left, #ffd1e8, transparent 35%),
    radial-gradient(circle at bottom right, #b58cff, transparent 35%),
    linear-gradient(135deg, #ff5f8f, #ff9671, #ffc75f);
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.title {
  font-size: clamp(54px, 10vw, 120px);
  line-height: 1;
  text-shadow: 0 14px 35px rgba(100, 0, 60, 0.35);
}

.scroll {
  margin-top: 45px;
  font-size: 30px;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  50% {
    transform: translateY(12px);
  }
}

.story {
  min-height: 100vh;
  padding: 70px 15px;
}

.story h2 {
  font-size: clamp(52px, 8vw, 95px);
  margin-bottom: 45px;
  text-shadow: 0 10px 28px rgba(100, 0, 60, 0.3);
}

/* сердечки и конфетти */
.heart, .confetti {
  position: fixed;
  pointer-events: none;
  z-index: 1;
}

.heart {
  bottom: -30px;
  font-size: 22px;
  animation: heartFloat linear infinite;
}

@keyframes heartFloat {
  to {
    transform: translateY(-115vh) rotate(360deg);
    opacity: 0;
  }
}

.confetti {
  top: -20px;
  width: 9px;
  height: 14px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  to {
    transform: translateY(115vh) rotate(500deg);
    opacity: 0;
  }
}

/* ОБЛОЖКА */
.cover {
  width: 330px;
  height: 445px;
  margin: 0 auto;
  position: relative;
  cursor: pointer;
  border-radius: 26px 16px 16px 26px;
  background:
    linear-gradient(90deg, rgba(30, 0, 20, 0.45), transparent 18%),
    radial-gradient(circle at 50% 35%, rgba(255,255,255,0.16), transparent 38%),
    linear-gradient(135deg, #4d1230, #b93d74 45%, #6a1f46);
  box-shadow:
    0 35px 85px rgba(55, 0, 35, 0.5),
    inset 0 0 0 7px rgba(255, 225, 170, 0.5),
    inset 0 0 0 17px rgba(255,255,255,0.07);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.7s ease;
}

.cover:hover {
  transform: rotateY(-10deg) scale(1.025);
}

.cover::before {
  content: "";
  position: absolute;
  inset: 30px;
  border: 2px solid rgba(255, 235, 180, 0.85);
  border-radius: 20px;
}

.cover::after {
  content: "";
  position: absolute;
  left: 42px;
  top: 0;
  width: 20px;
  height: 100%;
  background: rgba(30, 0, 20, 0.28);
  border-radius: 20px;
  box-shadow: 10px 0 20px rgba(255,255,255,0.06);
}

.cover-corner {
  position: absolute;
  width: 70px;
  height: 70px;
  border: 2px solid rgba(255, 235, 180, 0.7);
  z-index: 2;
}

.cover-corner.tl {
  top: 42px;
  left: 42px;
  border-right: none;
  border-bottom: none;
  border-radius: 18px 0 0 0;
}

.cover-corner.br {
  bottom: 42px;
  right: 42px;
  border-left: none;
  border-top: none;
  border-radius: 0 0 18px 0;
}

.cover-text {
  position: relative;
  z-index: 3;
  font-size: 68px;
  color: #fff2c5;
  text-shadow: 0 7px 18px rgba(0,0,0,0.45);
}

/* красивый замочек */
.lock {
  position: absolute;
  right: -36px;
  top: 182px;
  width: 76px;
  height: 60px;
  border-radius: 18px;
  background:
    radial-gradient(circle at 35% 25%, #fff4b8, transparent 25%),
    linear-gradient(135deg, #ffe28a, #b7791f 70%);
  box-shadow:
    0 14px 30px rgba(0,0,0,0.38),
    inset 0 0 10px rgba(255,255,255,0.25);
  z-index: 5;
}

.lock::before {
  content: "";
  position: absolute;
  left: 16px;
  top: -36px;
  width: 44px;
  height: 40px;
  border: 8px solid #ffe28a;
  border-bottom: none;
  border-radius: 38px 38px 0 0;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.12);
}

.lock::after {
  content: "♥";
  position: absolute;
  left: 24px;
  top: 12px;
  font-size: 29px;
  color: #7b2d43;
}

.lock.open {
  animation: unlock 0.75s forwards;
}

@keyframes unlock {
  0% { transform: scale(1); }
  45% { transform: scale(1.08) rotate(-10deg); }
  100% { transform: translateY(35px) rotate(22deg) scale(0); opacity: 0; }
}

/* КНИГА */
.book-wrap {
  display: none;
}

.book {
  width: min(94vw, 940px);
  height: 560px;
  margin: 0 auto;
  position: relative;
  perspective: 2200px;
  filter: drop-shadow(0 35px 70px rgba(60,0,40,0.42));
}

.book-bg {
  position: absolute;
  inset: 0;
  border-radius: 28px;
  background:
    linear-gradient(90deg,
      #b9834f 0%,
      #e3bd84 3%,
      #fff2d2 47%,
      #b98956 50%,
      #fff2d2 53%,
      #e3bd84 97%,
      #b9834f 100%);
  box-shadow:
    inset 0 0 35px rgba(90,45,20,0.28),
    0 30px 75px rgba(0,0,0,0.35);
}

.book-bg::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 24px;
  bottom: 24px;
  width: 8px;
  transform: translateX(-50%);
  background: rgba(95,55,30,0.4);
  border-radius: 999px;
  box-shadow: 0 0 25px rgba(70,40,20,0.35);
}

.book-bg::after {
  content: "";
  position: absolute;
  inset: 18px;
  border-radius: 20px;
  border: 1px solid rgba(120,75,35,0.2);
}

/* страницы */
.photo-page {
  position: absolute;
  top: 34px;
  width: calc(50% - 44px);
  height: calc(100% - 68px);
  border-radius: 18px;
  background:
    linear-gradient(135deg, #fff9e9, #f0d3a3);
  padding: 16px;
  overflow: hidden;
  box-shadow:
    inset 0 0 22px rgba(120,70,30,0.18),
    0 12px 24px rgba(80,40,20,0.16);
}

.left-page {
  left: 34px;
}

.right-page {
  right: 34px;
}

.photo-page img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 13px;
  display: block;
}

/* лист, который переворачивается */
.flip-page {
  position: absolute;
  top: 34px;
  left: 50%;
  width: calc(50% - 44px);
  height: calc(100% - 68px);
  transform-origin: left center;
  transform-style: preserve-3d;
  z-index: 20;
  display: none;
  will-change: transform;
  transition: transform 0.85s cubic-bezier(.22,.75,.25,1);
}

.flip-page.active {
  display: block;
}

.flip-page.turn {
  transform: rotateY(-180deg);
}

.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 18px;
  background: linear-gradient(135deg, #fff9e9, #f0d3a3);
  padding: 16px;
  overflow: hidden;
  box-shadow:
    inset 0 0 22px rgba(120,70,30,0.18),
    0 16px 32px rgba(80,40,20,0.22);
}

.face.back {
  transform: rotateY(180deg);
}

.face img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 13px;
}

/* кнопки */
.controls {
  margin-top: 28px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
}

button {
  border: none;
  border-radius: 999px;
  padding: 14px 25px;
  background: linear-gradient(135deg, #ff4f9a, #ff8fab);
  color: white;
  font-size: 18px;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 12px 28px rgba(130,0,70,0.25);
}

button:hover {
  transform: scale(1.04);
}

.counter {
  font-size: 22px;
  text-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

/* телефон */
@media(max-width:760px) {
  .book {
    height: 520px;
  }

  .book-bg::before {
    display: none;
  }

  .left-page {
    display: none;
  }

  .right-page {
    left: 34px;
    right: auto;
    width: calc(100% - 68px);
  }

  .flip-page {
    left: 34px;
    width: calc(100% - 68px);
  }

  .cover {
    width: 300px;
    height: 405px;
  }

  .cover-text {
    font-size: 60px;
  }
}
</style>
</head>

<body>

<div class="hero">
  <div class="title">С днём рождения,<br>Сашулька ❤️</div>
  <div class="scroll">Листай вниз ↓</div>
</div>

<section class="story">
  <h2>Наша история</h2>

  <div class="cover" id="cover" onclick="openBook()">
    <div class="cover-corner tl"></div>
    <div class="cover-corner br"></div>
    <div class="cover-text">Открыть</div>
    <div class="lock" id="lock"></div>
  </div>

  <div class="book-wrap" id="bookWrap">
    <div class="book">
      <div class="book-bg"></div>

      <div class="photo-page left-page">
        <img id="leftPhoto">
      </div>

      <div class="photo-page right-page">
        <img id="rightPhoto">
      </div>

      <div class="flip-page" id="flipPage">
        <div class="face front">
          <img id="flipFront">
        </div>
        <div class="face back">
          <img id="flipBack">
        </div>
      </div>
    </div>

    <div class="controls">
      <button onclick="prevSpread()">← Назад</button>
      <div class="counter" id="counter"></div>
      <button onclick="nextSpread()">Вперёд →</button>
    </div>
  </div>
</section>

<script>
const photos = [
"photo_2026-05-01_11-58-20.jpg",
"photo_2026-05-01_11-58-22.jpg",
"photo_2026-05-01_11-58-27.jpg",
"photo_2026-05-01_12-24-50.jpg",
"photo_2026-05-01_12-24-53.jpg",
"photo_2026-05-01_12-24-54.jpg",
"photo_2026-05-01_12-24-55.jpg",
"photo_2026-05-01_12-24-56.jpg",
"photo_2026-05-01_12-24-58.jpg",
"photo_2026-05-01_12-24-59.jpg",
"photo_2026-05-01_12-25-00.jpg",
"photo_2026-05-01_12-25-01.jpg",
"photo_2026-05-01_12-25-02.jpg",
"photo_2026-05-01_12-25-03.jpg",
"photo_2026-05-01_12-25-04.jpg",
"photo_2026-05-01_12-25-05.jpg",
"photo_2026-05-01_12-25-06.jpg",
"photo_2026-05-01_12-25-07.jpg"
];

let spread = 0;
let turning = false;
const totalSpreads = Math.ceil(photos.length / 2);

function photoAt(i) {
  return photos[i] || photos[photos.length - 1];
}

function renderSpread() {
  let leftIndex = spread * 2;
  let rightIndex = spread * 2 + 1;

  document.getElementById("leftPhoto").src = photoAt(leftIndex);
  document.getElementById("rightPhoto").src = photoAt(rightIndex);
  document.getElementById("counter").innerText = (spread + 1) + " / " + totalSpreads;
}

function openBook() {
  document.getElementById("lock").classList.add("open");

  setTimeout(() => {
    document.getElementById("cover").style.display = "none";
    document.getElementById("bookWrap").style.display = "block";
    renderSpread();
  }, 650);
}

function nextSpread() {
  if (turning || spread >= totalSpreads - 1) return;
  turning = true;

  const flip = document.getElementById("flipPage");

  document.getElementById("flipFront").src = photoAt(spread * 2 + 1);
  document.getElementById("flipBack").src = photoAt((spread + 1) * 2);

  flip.classList.add("active");

  setTimeout(() => {
    flip.classList.add("turn");
  }, 20);

  setTimeout(() => {
    spread++;
    renderSpread();
    flip.classList.remove("active", "turn");
    turning = false;
  }, 900);
}

function prevSpread() {
  if (turning || spread <= 0) return;
  turning = true;

  const flip = document.getElementById("flipPage");

  spread--;
  renderSpread();

  document.getElementById("flipFront").src = photoAt(spread * 2 + 1);
  document.getElementById("flipBack").src = photoAt((spread + 1) * 2);

  flip.classList.add("active", "turn");

  setTimeout(() => {
    flip.classList.remove("turn");
  }, 20);

  setTimeout(() => {
    flip.classList.remove("active");
    turning = false;
  }, 900);
}

/* меньше сердечек, чтобы не лагало */
for(let i = 0; i < 22; i++) {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (5 + Math.random() * 5) + "s";
  h.style.animationDelay = Math.random() * 4 + "s";
  document.body.appendChild(h);
}

/* конфетти только один раз, чтобы не грузило */
const colors = ["#ff4d6d", "#ffd166", "#06d6a0", "#4d96ff", "#c77dff", "#fff"];

for(let i = 0; i < 55; i++) {
  const c = document.createElement("div");
  c.className = "confetti";
  c.style.left = Math.random() * 100 + "vw";
  c.style.background = colors[Math.floor(Math.random() * colors.length)];
  c.style.animationDuration = (3 + Math.random() * 3) + "s";
  c.style.animationDelay = Math.random() * 2 + "s";
  c.style.borderRadius = Math.random() > 0.5 ? "50%" : "3px";
  document.body.appendChild(c);

  setTimeout(() => {
    c.remove();
  }, 7000);
}
</script>

</body>
</html>
